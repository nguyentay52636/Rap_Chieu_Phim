@foreground=rgb(60,60,60)
@background=rgb(250,250,250)

Menu.background=@background
# Light mode uses a dark gradient painted in code, so keep text/icons light
Menu.foreground=rgb(245,245,245)
Menu.lineColor=rgba(255,255,255,70)
Menu.arrowColor=rgba(255,255,255,180)
Menu.lightdark.background=rgba(255,255,255,25)
Menu.lightdark.button.background=rgba(255,255,255,35)
Menu.title.foreground=rgba(255,255,255,160)
Menu.button.background=rgba(0,0,0,0)
# Active item: darker purple over lighter gradient
Menu.button.selectedBackground=rgba(80,0,70,230)
Menu.button.selectedForeground=rgb(255,255,255)

Menu.ScrollBar.background=$Menu.background
Menu.ScrollBar.thumb=mix($Menu.background,$Menu.foreground,25%)


Toast.useEffect=false

Toast.success.outlineColor=#4caf50
Toast.info.outlineColor=#03a9f4
Toast.warning.outlineColor=#ff9800
Toast.error.outlineColor=#ef5350

# Accent Color
App.accent.default = #2675BF
App.accent.blue = #007AFF
App.accent.purple = #BF5AF2
App.accent.red = #FF3B30
App.accent.orange = #FF9500
App.accent.yellow = #FFCC00
App.accent.green = #28CD41
